apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: prod
  labels:
    app: fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: fastapi
        image: public.ecr.aws/docker/library/python:3.11-slim
        command: ["python", "-c"]
        args:
        - |
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type','application/json')
              self.end_headers()
              self.wfile.write(json.dumps({'status':'healthy','security':'restricted'}).encode())
            def log_message(self, *a): pass
          http.server.HTTPServer(('0.0.0.0',8000),H).serve_forever()
        ports:
        - containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: prod
spec:
  selector:
    app: fastapi
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    nodePort: 30080
  type: NodePort
